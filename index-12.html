<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coast to Coast Construction — Licensed General Contractor, South Florida</title>
<meta name="description" content="Coast to Coast Construction. Florida Certified General Contractor. Commercial tenant improvements, concrete restoration, and medical office buildouts across South Florida.">
<style>
  :root{
    --paper:#f7f6f2;
    --ink:#1c2430;
    --line:#c9ccc9;
    --line-soft:#e3e4e0;
    --accent:#b3541e;
    --muted:#6b7280;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--paper);
    color:var(--ink);
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size:48px 48px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .sheet{
    width:100%;
    max-width:720px;
    background:var(--paper);
    border:2px solid var(--ink);
    box-shadow:8px 8px 0 rgba(28,36,48,.12);
  }
  .field{
    padding:64px 48px 56px;
    text-align:center;
    border-bottom:2px solid var(--ink);
  }
  .logo{
    max-width:280px;
    max-height:160px;
    width:auto;
    height:auto;
    display:block;
    margin:0 auto 32px;
  }
  h1{
    font-size:clamp(1.6rem,4vw,2.4rem);
    font-weight:normal;
    letter-spacing:.02em;
    margin-bottom:12px;
  }
  .rule{
    width:64px;
    height:3px;
    background:var(--accent);
    margin:0 auto 16px;
  }
  .tagline{
    font-family:Verdana,Arial,sans-serif;
    font-size:.78rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--muted);
  }
  /* Title block — drawn like an architectural sheet's title block */
  .titleblock{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    font-family:Verdana,Arial,sans-serif;
  }
  .cell{
    padding:14px 16px 16px;
    border-right:1px solid var(--line);
  }
  .cell:last-child{border-right:none}
  .cell .lbl{
    display:block;
    font-size:.6rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
  }
  .cell .val{
    font-size:.85rem;
    color:var(--ink);
    word-break:break-word;
  }
  .cell a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--accent)}
  .cell a:hover{color:var(--accent)}
  .cell a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media (max-width:560px){
    .field{padding:48px 24px 40px}
    .titleblock{grid-template-columns:1fr}
    .cell{border-right:none;border-bottom:1px solid var(--line)}
    .cell:last-child{border-bottom:none}
  }
</style>
</head>
<body>
  <main class="sheet">
    <div class="field">
      <img class="logo" src="logo.png" alt="Coast to Coast Construction logo">
      <h1>Coast to Coast Construction</h1>
      <div class="rule"></div>
      <p class="tagline">General Contracting &middot; South Florida</p>
    </div>
    <div class="titleblock">
      <div class="cell">
        <span class="lbl">License</span>
        <span class="val">FL CGC1539429</span>
      </div>
      <div class="cell">
        <span class="lbl">Email</span>
        <span class="val"><a href="mailto:info@coast2coast.construction">info@coast2coast.construction</a></span>
      </div>
      <div class="cell">
        <span class="lbl">Service Area</span>
        <span class="val">Broward &middot; Miami-Dade &middot; Orlando</span>
      </div>
    </div>
  </main>
</body>
</html>
